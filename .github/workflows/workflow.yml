name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up job
        run: echo "Starting job"

      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: flake8/eslint
        run: npx eslint .

      - name: nose/jest
        run: npx jest --passWithNoTests

      - name: Complete job
        run: echo "Done"
